[toddler-game]
exten => s,1,Answer()
same => n,Set(TIMEOUT(digit)=0.5)
same => n,Playback(silence/1)
same => n(loop),WaitExten(15)

exten => 700,1,Answer()
same => n,Set(TIMEOUT(digit)=0.5)
same => n,Playback(silence/1)
same => n(loop),WaitExten(15)

; Main number pad handler (DTMF audio inputs mid-call)
exten => _[0-9*#],1,Playback(toddler/${EXTEN})
same => n,Goto(700,loop)

; Side and context key handler (DTMF 701-728)
exten => _7XX,1,Playback(toddler/${EXTEN})
same => n,Goto(700,loop)

exten => t,1,Hangup()
exten => i,1,Goto(700,loop)
